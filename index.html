<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pocket Tetris" />
  <title>Pocket Tetris</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile-fix.css" />
</head>
<body>
  <main class="app-shell" aria-label="Tetris game">
    <header class="topbar">
      <div>
        <p class="eyebrow">RESPONSIVE WEB GAME</p>
        <h1>Pocket Tetris</h1>
      </div>
      <button id="pauseButton" class="icon-button" type="button" aria-label="Pause">II</button>
    </header>

    <section class="game-layout">
      <aside class="stats-panel stats-left" aria-label="Game information">
        <div class="stat-card"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat-card"><span>Lines</span><strong id="lines">0</strong></div>
        <div class="stat-card"><span>Level</span><strong id="level">1</strong></div>
        <div class="mini-card"><span>Hold</span><canvas id="holdCanvas" width="120" height="120" aria-label="Held piece"></canvas></div>
      </aside>

      <section class="board-wrap" aria-label="Game board">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        <div id="overlay" class="overlay is-visible" role="dialog" aria-live="polite">
          <div class="overlay-card">
            <p class="overlay-kicker">Ready?</p>
            <h2 id="overlayTitle">Pocket Tetris</h2>
            <p id="overlayText">Play with the touch controls or arrow keys.</p>
            <button id="startButton" class="primary-button" type="button">Start Game</button>
          </div>
        </div>
      </section>

      <aside class="stats-panel stats-right">
        <div class="mini-card"><span>Next</span><canvas id="nextCanvas" width="120" height="360" aria-label="Next pieces"></canvas></div>
        <div class="help-card">
          <span>PC Controls</span>
          <p>← → Move</p><p>↑ Rotate / ↓ Soft drop</p><p>Space: Hard drop</p><p>C: Hold / P: Pause</p>
        </div>
      </aside>
    </section>

    <section class="touch-controls" aria-label="Touch controls">
      <div class="control-group horizontal-controls">
        <button class="control-button" data-action="left" type="button" aria-label="Move left">←</button>
        <button class="control-button" data-action="down" type="button" aria-label="Move down">↓</button>
        <button class="control-button" data-action="right" type="button" aria-label="Move right">→</button>
      </div>
      <div class="control-group action-controls">
        <button class="control-button accent" data-action="rotate" type="button" aria-label="Rotate">↻</button>
        <button class="control-button accent" data-action="hardDrop" type="button" aria-label="Hard drop">⇣</button>
        <button class="control-button accent" data-action="hold" type="button" aria-label="Hold">HOLD</button>
      </div>
    </section>

    <footer><span>GitHub Pages ready</span><span>iPhone / Android / PC</span></footer>
  </main>

  <script src="game.js"></script>
  <script src="ui-english.js"></script>
</body>
</html>
